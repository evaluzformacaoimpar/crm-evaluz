<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eva Luz CRM — Criar Conta</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <style>
    body { background:var(--bg); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .signup-card { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:420px; box-shadow:0 8px 32px rgba(0,31,63,.1); }
    .brand { text-align:center; margin-bottom:28px; }
    .brand-name { font-size:22px; font-weight:800; color:var(--primary); letter-spacing:.5px; }
    .brand-sub { font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:2px; margin-top:3px; }
    .signup-title { font-size:18px; font-weight:700; color:var(--primary); text-align:center; margin-bottom:6px; }
    .signup-sub { font-size:0.83rem; color:var(--text-muted); text-align:center; margin-bottom:24px; }
    .error-box { background:#fef2f2; border:1px solid #fca5a5; border-radius:8px; padding:12px 14px; color:#dc2626; font-size:0.85rem; margin-bottom:14px; display:none; }
    .success-box { background:rgba(40,167,69,.08); border:1px solid rgba(40,167,69,.25); border-radius:8px; padding:16px 14px; color:var(--success); font-size:0.87rem; margin-bottom:14px; display:none; text-align:center; line-height:1.6; }
    .pw-wrap { position:relative; }
    .pw-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:16px; color:var(--text-muted); }
  </style>
</head>
<body>
  <div class="signup-card">
    <div class="brand">
      <div class="brand-name">Eva Luz Vendas</div>
      <div class="brand-sub">CRM</div>
    </div>

    <div id="loading-state" style="text-align:center;padding:20px;color:var(--text-muted);">
      <div style="font-size:1.5rem;margin-bottom:8px;">⏳</div>
      Verificando convite...
    </div>

    <div id="signup-form" style="display:none;">
      <div class="signup-title">Criar sua conta</div>
      <div class="signup-sub" id="signup-sub-text">Você foi convidada para acessar o CRM.</div>

      <div class="error-box"   id="err-box"></div>
      <div class="success-box" id="ok-box"></div>

      <div class="form-group">
        <label class="form-label">Seu Nome</label>
        <input type="text" id="s-name" class="form-control" placeholder="Nome completo">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="s-email" class="form-control" readonly style="background:var(--bg);">
      </div>
      <div class="form-group">
        <label class="form-label">Senha <span class="required">*</span></label>
        <div class="pw-wrap">
          <input type="password" id="s-pass" class="form-control" placeholder="Mínimo 6 caracteres">
          <button type="button" class="pw-toggle" onclick="togglePw('s-pass',this)">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar Senha <span class="required">*</span></label>
        <div class="pw-wrap">
          <input type="password" id="s-pass2" class="form-control" placeholder="Repita a senha">
          <button type="button" class="pw-toggle" onclick="togglePw('s-pass2',this)">👁️</button>
        </div>
      </div>

      <button class="btn btn-accent" style="width:100%;margin-top:8px;" id="btn-criar" onclick="criarConta()">Criar Conta</button>
    </div>

    <div id="invalid-state" style="display:none;text-align:center;padding:20px;">
      <div style="font-size:2rem;margin-bottom:12px;">❌</div>
      <p style="font-weight:700;color:var(--primary);margin-bottom:8px;">Link inválido ou já utilizado</p>
      <p style="font-size:0.85rem;color:var(--text-muted);line-height:1.6;">
        Este link de convite não é válido ou já foi usado.<br>
        Peça à administradora para gerar um novo convite.
      </p>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    let inviteData = null;

    async function init() {
      const params = new URLSearchParams(location.search);
      const token  = params.get('token');

      if (!token) { showInvalid(); return; }

      const { data, error } = await supabase
        .from('invited_emails')
        .select('*')
        .eq('id', token)
        .eq('used', false)
        .single();

      document.getElementById('loading-state').style.display = 'none';

      if (error || !data) { showInvalid(); return; }

      inviteData = data;
      document.getElementById('s-email').value = data.email;
      document.getElementById('s-name').value  = data.name;
      document.getElementById('signup-sub-text').textContent =
        `Você foi convidado(a) para acessar o CRM Eva Luz Vendas como ${data.role === 'admin' ? 'Administrador(a)' : 'Colaborador(a)'}.`;
      document.getElementById('signup-form').style.display = 'block';
    }

    function showInvalid() {
      document.getElementById('loading-state').style.display  = 'none';
      document.getElementById('invalid-state').style.display  = 'block';
    }

    function showErr(msg) {
      const el = document.getElementById('err-box');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideErr() {
      document.getElementById('err-box').style.display = 'none';
    }

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
      else { inp.type = 'password'; btn.textContent = '👁️'; }
    }

    async function criarConta() {
      hideErr();
      const name  = document.getElementById('s-name').value.trim();
      const email = document.getElementById('s-email').value.trim();
      const pass  = document.getElementById('s-pass').value;
      const pass2 = document.getElementById('s-pass2').value;

      if (!name)          { showErr('Informe seu nome.'); return; }
      if (pass.length < 6){ showErr('A senha deve ter no mínimo 6 caracteres.'); return; }
      if (pass !== pass2) { showErr('As senhas não coincidem.'); return; }

      const btn = document.getElementById('btn-criar');
      btn.textContent = 'Criando conta...';
      btn.disabled    = true;

      try {
        const { data: authData, error: authErr } = await supabase.auth.signUp({ email, password: pass });
        if (authErr) {
          btn.textContent = 'Criar Conta';
          btn.disabled    = false;
          showErr('Erro ao criar conta: ' + authErr.message);
          return;
        }

        const userId = authData?.user?.id;
        if (userId) {
          await supabase.from('profiles').upsert({ id: userId, name, role: inviteData.role });
          await supabase.from('invited_emails').update({ used: true }).eq('id', inviteData.id);
        }

        const okBox = document.getElementById('ok-box');
        okBox.innerHTML = `<strong>✅ Conta criada com sucesso!</strong><br><br>
          Verifique seu email <strong>${email}</strong> para confirmar o endereço.<br>
          Após confirmar, <a href="index.html" style="color:var(--accent);font-weight:600;">clique aqui para fazer login</a>.`;
        okBox.style.display = 'block';
        document.getElementById('btn-criar').style.display = 'none';
      } catch(err) {
        btn.textContent = 'Criar Conta';
        btn.disabled    = false;
        showErr('Erro inesperado: ' + err.message);
      }
    }

    init();
  </script>
</body>
</html>
