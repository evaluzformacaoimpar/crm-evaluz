<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eva Luz CRM — Contatos</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
</head>
<body>
  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">
      <header class="page-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="hamburger" id="hamburger">☰</button>
          <h1 class="page-title">Contatos <span>/ Funil</span></h1>
        </div>
        <button class="btn btn-accent" id="btn-novo-contato">+ Novo Contato</button>
      </header>

      <div class="page-body">
        <div class="kanban-toolbar">
          <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="busca" class="form-control" placeholder="Buscar por nome ou telefone...">
          </div>
          <select id="filtro-etapa" class="form-select" style="width:auto;">
            <option value="">Todas as etapas</option>
            <option value="abordagem">Abordagem</option>
            <option value="sondagem">Sondagem</option>
            <option value="apresentacao">Apresentação</option>
            <option value="negociacao">Negociação</option>
            <option value="follow_up">Follow-up</option>
            <option value="vendas_efetivadas">Vendas Efetivadas</option>
            <option value="pos_vendas">Pós Vendas</option>
            <option value="indicacao">Indicação</option>
            <option value="trafego_pago">Tráfego Pago</option>
            <option value="sem_interesse">Sem Interesse</option>
            <option value="reativar">Reativar Contato</option>
          </select>
          <select id="filtro-origem" class="form-select" style="width:auto;">
            <option value="">Todas as origens</option>
            <option value="instagram">Instagram</option>
            <option value="youtube">YouTube</option>
            <option value="facebook">Facebook</option>
            <option value="google">Google</option>
            <option value="hotmart">Hotmart</option>
            <option value="indicacao">Indicação</option>
            <option value="trafego_pago">Tráfego Pago</option>
            <option value="outro">Outro</option>
          </select>
          <div style="margin-left:auto;display:flex;gap:8px;">
            <button class="btn btn-outline btn-sm" id="btn-exportar">⬇️ Exportar</button>
            <button class="btn btn-outline btn-sm" id="btn-kanban">Kanban</button>
            <button class="btn btn-outline btn-sm" id="btn-lista">Lista</button>
          </div>
        </div>

        <div id="view-kanban" class="kanban-board"></div>

        <div id="view-lista" style="display:none;">
          <div class="card" style="padding:0;overflow:hidden;">
            <div class="table-responsive">
              <table class="table">
                <thead>
                  <tr><th>Nome</th><th>Telefone</th><th>Etapa</th><th>Origem</th><th>DISC</th><th>Tipo</th><th>Último Contato</th><th>Ações</th></tr>
                </thead>
                <tbody id="lista-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Novo/Editar Contato -->
  <div id="modal-contato" class="modal-overlay" style="display:none;">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-contato-title">Novo Contato</h3>
        <button class="btn btn-ghost btn-icon" id="btn-fechar-modal">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="contato-id">
        <div id="modal-erro" style="display:none;padding:10px 14px;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;color:#dc2626;font-size:0.85rem;margin-bottom:12px;"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 20px;">
          <div>
            <p style="font-weight:700;color:var(--accent);font-size:0.8rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;">Dados Básicos</p>
            <div class="form-group">
              <label class="form-label">Nome Completo <span class="required">*</span></label>
              <input type="text" id="c-name" class="form-control" placeholder="Nome do contato">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Telefone / WhatsApp</label>
                <input type="tel" id="c-phone" class="form-control" placeholder="(11) 99999-9999">
              </div>
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="c-email" class="form-control" placeholder="email@exemplo.com">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Instagram</label>
                <input type="text" id="c-instagram" class="form-control" placeholder="@usuario">
              </div>
              <div class="form-group">
                <label class="form-label">Facebook</label>
                <input type="text" id="c-facebook" class="form-control" placeholder="facebook.com/usuario">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Outra Rede Social</label>
              <input type="text" id="c-other" class="form-control" placeholder="LinkedIn, YouTube etc.">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Origem</label>
                <select id="c-source" class="form-select">
                  <option value="">Selecione...</option>
                  <option value="instagram">Instagram</option>
                  <option value="youtube">YouTube</option>
                  <option value="facebook">Facebook</option>
                  <option value="google">Google</option>
                  <option value="hotmart">Hotmart</option>
                  <option value="indicacao">Indicação</option>
                  <option value="trafego_pago">Tráfego Pago</option>
                  <option value="outro">Outro</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Etapa do Funil</label>
                <select id="c-stage" class="form-select">
                  <option value="">Selecione...</option>
                  <option value="abordagem">Abordagem</option>
                  <option value="sondagem">Sondagem</option>
                  <option value="apresentacao">Apresentação</option>
                  <option value="negociacao">Negociação</option>
                  <option value="follow_up">Follow-up</option>
                  <option value="vendas_efetivadas">Vendas Efetivadas</option>
                  <option value="pos_vendas">Pós Vendas</option>
                  <option value="indicacao">Indicação</option>
                  <option value="trafego_pago">Tráfego Pago</option>
                  <option value="sem_interesse">Sem Interesse</option>
                  <option value="reativar">Reativar Contato</option>
                </select>
              </div>
            </div>
          </div>
          <div>
            <p style="font-weight:700;color:var(--accent);font-size:0.8rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;">Perfil Comportamental</p>
            <div class="form-group">
              <label class="form-label">Tipo de Cliente</label>
              <select id="c-type" class="form-select">
                <option value="">Selecione...</option>
                <option value="pragmatico">Pragmático</option>
                <option value="analitico">Analítico</option>
                <option value="consensual">Consensual</option>
                <option value="inovador">Inovador</option>
                <option value="desconfiado">Desconfiado</option>
                <option value="conservador">Conservador</option>
                <option value="estraga_prazeres">Estraga-prazeres</option>
                <option value="economico">Econômico</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Sistema Representativo (VAK)</label>
              <select id="c-sensory" class="form-select">
                <option value="">Selecione...</option>
                <option value="visual">Visual</option>
                <option value="auditivo">Auditivo</option>
                <option value="sinestesico">Sinestésico</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Perfil DISC</label>
              <select id="c-disc" class="form-select">
                <option value="">Selecione...</option>
                <option value="executor">Executor (D)</option>
                <option value="comunicador">Comunicador (I)</option>
                <option value="planejador">Planejador (S)</option>
                <option value="analista">Analista (C)</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Notas</label>
              <textarea id="c-notes" class="form-textarea" rows="5" placeholder="Observações sobre o contato..."></textarea>
            </div>
          </div>
        </div>

        <!-- Agendamento de Próximo Contato -->
        <div style="border-top:1px solid var(--border);margin-top:20px;padding-top:16px;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
            <input type="checkbox" id="c-agendar" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;">
            <label for="c-agendar" style="font-weight:700;color:var(--primary);cursor:pointer;font-size:0.88rem;">📅 Agendar próximo contato com este cliente</label>
          </div>
          <div id="agendamento-fields" style="display:none;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px;">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 16px;">
              <div class="form-group">
                <label class="form-label">Tipo de Ação</label>
                <select id="c-task-tipo" class="form-select">
                  <option value="Ligar">📞 Ligar</option>
                  <option value="WhatsApp">💬 WhatsApp</option>
                  <option value="Reunião">🤝 Reunião</option>
                  <option value="Email">📧 Email</option>
                  <option value="Outro">📌 Outro</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Data <span class="required">*</span></label>
                <input type="date" id="c-task-data" class="form-control">
              </div>
              <div class="form-group">
                <label class="form-label">Hora</label>
                <input type="time" id="c-task-hora" class="form-control">
              </div>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Observação (opcional)</label>
              <input type="text" id="c-task-obs" class="form-control" placeholder="Ex: Retornar sobre proposta, cliente pediu mais informações...">
            </div>
          </div>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="btn-cancelar-modal">Cancelar</button>
        <button class="btn btn-accent" id="btn-salvar-contato">Salvar Contato</button>
      </div>
    </div>
  </div>

  <!-- Modal Confirmar Exclusão -->
  <div id="modal-delete" class="modal-overlay" style="display:none;">
    <div class="modal" style="max-width:380px;">
      <div class="modal-header">
        <h3 class="modal-title">Confirmar Exclusão</h3>
        <button class="btn btn-ghost btn-icon" id="btn-fechar-delete">✕</button>
      </div>
      <div class="modal-body">
        <p>Tem certeza que deseja excluir o contato <strong id="delete-name"></strong>?</p>
        <p style="font-size:0.82rem;color:var(--danger);margin-top:8px;">Essa ação não pode ser desfeita.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="btn-cancelar-delete">Cancelar</button>
        <button class="btn btn-danger" id="btn-confirmar-delete">Excluir</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/contatos.js"></script>
</body>
</html>
