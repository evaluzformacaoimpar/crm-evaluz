<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eva Luz CRM — Agenda</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
</head>
<body>
  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">
      <header class="page-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="hamburger" id="hamburger">☰</button>
          <h1 class="page-title">Agenda <span>/ Ligações</span></h1>
        </div>
        <span id="today-label" style="font-size:0.82rem;color:var(--text-muted);font-weight:500;"></span>
      </header>

      <div class="page-body">

        <!-- Alerta de ligações do dia -->
        <div id="alerta-hoje" style="display:none;background:linear-gradient(135deg,var(--primary) 0%,#003a6e 100%);color:white;border-radius:14px;padding:18px 24px;margin-bottom:24px;align-items:center;gap:18px;box-shadow:0 4px 18px rgba(0,31,63,0.18);">
          <span style="font-size:2.4rem;flex-shrink:0;">📞</span>
          <div>
            <div style="font-weight:700;font-size:1.08rem;" id="alerta-texto">Ligações para hoje</div>
            <div style="font-size:0.82rem;opacity:0.85;margin-top:3px;">Clique no contato para ver o histórico completo. Use o botão WhatsApp para abrir a conversa direto.</div>
          </div>
        </div>

        <!-- Container da agenda + painel lateral de cadência -->
        <div class="agenda-layout">
          <div id="agenda-container"></div>
          <aside id="cadencia-lateral" class="cadence-sidebar"></aside>
        </div>

      </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <script>
    var allTasks = [];
    var todayStr = todayISO();
    var tomorrowDate = new Date(); tomorrowDate.setDate(tomorrowDate.getDate() + 1);
    var tomorrowStr = tomorrowDate.toISOString().split('T')[0];

    async function init() {
      await checkSession();
      await injectNav('agenda');
      document.getElementById('today-label').textContent = new Date().toLocaleDateString('pt-BR', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });
      await loadAgenda();
    }

    async function loadAgenda() {
      var container = document.getElementById('agenda-container');
      container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);">Carregando agenda...</div>';

      var result = await supabase
        .from('tasks')
        .select('*, contacts(id, name, phone)')
        .neq('status', 'concluida')
        .order('due_date', { ascending: true })
        .order('due_time', { ascending: true, nullsFirst: false });

      if (result.error) {
        container.innerHTML = '<div class="empty-state"><p>Erro ao carregar agenda. Recarregue a página.</p></div>';
        return;
      }

      allTasks = result.data || [];
      render();
      await loadCadenceSidebar();
    }

    async function loadCadenceSidebar() {
      var aside = document.getElementById('cadencia-lateral');
      if (!aside) return;

      var contactIds = [...new Set(allTasks.map(function(t) { return t.contact_id; }).filter(Boolean))];
      if (!contactIds.length) {
        aside.innerHTML = '<div class="cadence-sidebar-title">Fluxo de Cadência</div><div class="empty-state" style="padding:20px 8px;"><p style="font-size:0.82rem;">Nenhum cliente com compromisso agendado</p></div>';
        return;
      }

      var result = await supabase
        .from('tasks')
        .select('contact_id, title, status, due_date, contacts(id, name)')
        .in('contact_id', contactIds)
        .ilike('title', 'Dia %');

      if (result.error) { aside.innerHTML = ''; return; }

      var byContact = {};
      (result.data || []).forEach(function(t) {
        if (!t.contacts) return;
        if (!byContact[t.contact_id]) byContact[t.contact_id] = { contact: t.contacts, tasks: [] };
        byContact[t.contact_id].tasks.push(t);
      });

      var items = Object.values(byContact)
        .map(function(c) { return { contact: c.contact, progress: getCadenceProgress(c.tasks) }; })
        .filter(function(c) { return c.progress; });

      items.sort(function(a, b) {
        if (a.progress.isComplete !== b.progress.isComplete) return a.progress.isComplete ? 1 : -1;
        return (a.progress.current.due_date || '').localeCompare(b.progress.current.due_date || '');
      });

      if (!items.length) {
        aside.innerHTML = '<div class="cadence-sidebar-title">Fluxo de Cadência</div><div class="empty-state" style="padding:20px 8px;"><p style="font-size:0.82rem;">Nenhum cliente da agenda está em cadência</p></div>';
        return;
      }

      aside.innerHTML = '<div class="cadence-sidebar-title">Fluxo de Cadência</div>' + items.map(function(c) {
        var p = c.progress;
        var isAtrasada = !p.isComplete && p.current.status === 'atrasada';
        return [
          '<a href="contato.html?id=' + c.contact.id + '" class="cadence-sidebar-item">',
          '  <div class="cadence-sidebar-name">' + c.contact.name + '</div>',
          '  <div class="cadence-bar" style="margin-bottom:4px;"><div class="cadence-bar-fill ' + (p.isComplete?'complete':'') + '" style="width:' + p.percent + '%;"></div></div>',
          '  <div class="cadence-sidebar-stage ' + (isAtrasada?'atrasada':'') + '">' + (p.isComplete ? '✅ Cadência completa' : (isAtrasada ? '⚠️ ' : '') + p.current.title) + '</div>',
          '</a>'
        ].join('');
      }).join('');
    }

    function render() {
      var container = document.getElementById('agenda-container');
      var hoje = allTasks.filter(function(t) { return t.due_date === todayStr; });

      // Alerta do dia
      var alertEl = document.getElementById('alerta-hoje');
      if (hoje.length > 0) {
        alertEl.style.display = 'flex';
        document.getElementById('alerta-texto').textContent =
          hoje.length === 1
            ? 'Você tem 1 contato agendado para hoje'
            : 'Você tem ' + hoje.length + ' contatos agendados para hoje';
      } else {
        alertEl.style.display = 'none';
      }

      if (allTasks.length === 0) {
        container.innerHTML = [
          '<div class="empty-state" style="margin-top:32px;">',
          '  <div class="empty-icon">📅</div>',
          '  <p style="font-size:1rem;font-weight:600;margin-bottom:8px;">Nenhum contato agendado</p>',
          '  <p style="color:var(--text-muted);max-width:340px;margin:0 auto;">',
          '    Ao cadastrar um contato e marcar "Agendar próximo contato", ele aparece aqui.',
          '  </p>',
          '  <a href="contatos.html?novo=1" class="btn btn-accent" style="margin-top:20px;">+ Novo Contato</a>',
          '</div>'
        ].join('');
        return;
      }

      // Agrupar por data
      var groups = {};
      allTasks.forEach(function(t) {
        if (!groups[t.due_date]) groups[t.due_date] = [];
        groups[t.due_date].push(t);
      });

      var html = Object.keys(groups).sort().map(function(date) {
        var isAtrasada = date < todayStr;
        var isHoje = date === todayStr;
        var isAmanha = date === tomorrowStr;

        var label = isAtrasada ? 'Atrasadas — ' + formatDate(date)
          : isHoje    ? 'Hoje'
          : isAmanha  ? 'Amanhã'
          : formatDate(date);

        var headerColor = isAtrasada ? 'color:var(--danger);'
          : isHoje ? 'color:var(--accent);'
          : '';

        var badge = isAtrasada ? 'badge-danger'
          : isHoje ? 'badge-accent'
          : 'badge-gray';

        var icon = isAtrasada ? '⚠️' : isHoje ? '📞' : '🗓️';

        var items = groups[date].map(function(t) { return renderTask(t, isAtrasada, isHoje); }).join('');

        return [
          '<div class="tasks-section" style="margin-bottom:28px;">',
          '  <div class="tasks-section-header" style="' + headerColor + '">',
          '    <span style="font-size:1.1rem;">' + icon + '</span>',
          '    <span class="tasks-section-title">' + label + '</span>',
          '    <span class="badge ' + badge + '" style="' + (isHoje ? 'background:rgba(184,115,51,0.12);color:var(--accent-dark);' : '') + '">' + groups[date].length + '</span>',
          '  </div>',
          items,
          '</div>'
        ].join('');
      }).join('');

      container.innerHTML = html;
    }

    function renderTask(t, isAtrasada, isHoje) {
      var title = t.title || '';
      var icon = title.indexOf('WhatsApp') === 0 ? '💬'
        : title.indexOf('Reunião') === 0 ? '🤝'
        : title.indexOf('Email') === 0 ? '📧'
        : '📞';

      var cls = isAtrasada ? 'atrasada' : isHoje ? 'hoje' : '';
      var contactName = (t.contacts && t.contacts.name) ? t.contacts.name : 'Contato';
      var contactId   = (t.contacts && t.contacts.id)   ? t.contacts.id   : '';
      var phone       = (t.contacts && t.contacts.phone) ? t.contacts.phone : '';

      var phoneSafe = phone.replace(/'/g, '');
      var whatsappBtn = phone
        ? '<button class="btn btn-whatsapp btn-sm" onclick="openWhatsApp(\'' + phoneSafe + '\',\'\')" title="Abrir WhatsApp">💬 WhatsApp</button>'
        : '';

      var concluirBtn = '<button class="btn btn-success btn-sm btn-icon" onclick="concluir(\'' + t.id + '\')" title="Registrar como concluído">✓</button>';

      return [
        '<div class="task-item ' + cls + '" style="cursor:default;">',
        '  <div class="task-body" style="flex:1;">',
        '    <div class="task-title" style="display:flex;align-items:center;gap:8px;">',
        '      <span style="font-size:1.1rem;">' + icon + '</span>',
        '      <a href="contato.html?id=' + contactId + '" style="color:var(--primary);font-weight:700;text-decoration:none;">' + contactName + '</a>',
        '      <span style="font-size:0.78rem;font-weight:400;color:var(--text-muted);">' + title + '</span>',
        '    </div>',
        '    <div class="task-meta">',
             (t.due_time ? '<span>🕐 ' + t.due_time.slice(0,5) + '</span>' : ''),
             (isAtrasada ? '<span class="badge badge-danger" style="font-size:0.68rem;">Atrasada</span>' : ''),
        '    </div>',
             (t.description ? '<p style="font-size:0.8rem;color:var(--text-muted);margin-top:4px;">' + t.description + '</p>' : ''),
        '  </div>',
        '  <div class="task-actions" style="display:flex;gap:8px;flex-shrink:0;align-items:center;">',
             whatsappBtn,
             concluirBtn,
        '  </div>',
        '</div>'
      ].join('');
    }

    async function concluir(id) {
      var result = await supabase.from('tasks').update({ status: 'concluida' }).eq('id', id);
      if (result.error) { showToast('Erro ao registrar', 'error'); return; }
      allTasks = allTasks.filter(function(t) { return t.id !== id; });
      render();
      showToast('Contato registrado como concluído!', 'success');
    }

    init();
  </script>
</body>
</html>
