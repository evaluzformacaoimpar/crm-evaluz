<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eva Luz CRM — Relatórios</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
</head>
<body>
  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <main class="main-content">
      <header class="page-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="hamburger" id="hamburger">☰</button>
          <h1 class="page-title">Relatórios <span>/ Métricas</span></h1>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
          <input type="month" id="filtro-mes" class="form-control" style="width:auto;">
          <button class="btn btn-accent" onclick="openModal('modal-metrica')">+ Registrar</button>
        </div>
      </header>
      <div class="page-body">
        <div class="stats-grid">
          <div class="stat-card blue">
            <div class="stat-label"><span class="stat-icon">📞</span>Contatos Feitos</div>
            <div class="stat-value" id="r-contatos">...</div>
            <div class="card-sub">no período</div>
          </div>
          <div class="stat-card">
            <div class="stat-label"><span class="stat-icon">📄</span>Cotações Enviadas</div>
            <div class="stat-value" id="r-cotacoes">...</div>
            <div class="card-sub">no período</div>
          </div>
          <div class="stat-card green">
            <div class="stat-label"><span class="stat-icon">🏆</span>Vendas Efetivadas</div>
            <div class="stat-value" id="r-vendas">...</div>
            <div class="card-sub">no período</div>
          </div>
          <div class="stat-card sage">
            <div class="stat-label"><span class="stat-icon">📊</span>Taxa de Conversão</div>
            <div class="stat-value" id="r-conversao">...</div>
            <div class="card-sub">vendas / contatos</div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
          <!-- Funil de Conversão -->
          <div class="card">
            <div class="card-header"><h2 class="card-title">Funil de Conversão</h2></div>
            <div id="funil-relatorio"></div>
          </div>
          <!-- Contatos por Origem -->
          <div class="card">
            <div class="card-header"><h2 class="card-title">Contatos por Origem</h2></div>
            <div id="origem-relatorio"></div>
          </div>
        </div>

        <!-- Histórico de Métricas -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Histórico de Métricas</h2>
          </div>
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr><th>Tipo</th><th>Contato</th><th>Valor</th><th>Data</th><th>Notas</th></tr>
              </thead>
              <tbody id="metrics-body">
                <tr><td colspan="5" style="text-align:center;color:var(--text-muted);">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Registrar Métrica -->
  <div id="modal-metrica" class="modal-overlay" style="display:none;" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Registrar Atividade</h3>
        <button class="btn btn-ghost btn-icon" onclick="closeModal('modal-metrica')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Tipo <span class="required">*</span></label>
          <select id="m-type" class="form-select">
            <option value="contato">Contato Feito</option>
            <option value="cotacao">Cotação Enviada</option>
            <option value="venda">Venda Efetivada</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Contato <span class="required">*</span></label>
          <select id="m-contact" class="form-select">
            <option value="">Selecione o contato...</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Valor (R$)</label>
            <input type="number" id="m-value" class="form-control" placeholder="0,00" step="0.01">
          </div>
          <div class="form-group">
            <label class="form-label">Data</label>
            <input type="date" id="m-date" class="form-control">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notas</label>
          <input type="text" id="m-notes" class="form-control" placeholder="Observações...">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('modal-metrica')">Cancelar</button>
        <button class="btn btn-accent" onclick="salvarMetrica()">Registrar</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    async function init() {
      await checkSession();
      await injectNav('relatorios');
      const now = new Date();
      document.getElementById('filtro-mes').value = now.toISOString().slice(0, 7);
      document.getElementById('m-date').value = todayISO();
      await loadContacts();
      await loadData();
    }

    async function loadContacts() {
      const { data } = await supabase.from('contacts').select('id, name').order('name');
      const sel = document.getElementById('m-contact');
      (data || []).forEach(c => {
        sel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
      });
    }

    async function loadData() {
      const mes = document.getElementById('filtro-mes').value;
      const firstDay = mes + '-01';
      const lastDay  = new Date(mes.slice(0,4), parseInt(mes.slice(5,7)), 0).toISOString().split('T')[0];

      const [
        { data: metrics },
        { data: contacts },
        { data: allMetrics },
      ] = await Promise.all([
        supabase.from('metrics').select('*, contacts(name)')
          .gte('date', firstDay).lte('date', lastDay)
          .order('date', { ascending: false }),
        supabase.from('contacts').select('funnel_stage, source'),
        supabase.from('metrics').select('type').gte('date', firstDay).lte('date', lastDay),
      ]);

      const m = allMetrics || [];
      const contatos  = m.filter(x => x.type === 'contato').length;
      const cotacoes  = m.filter(x => x.type === 'cotacao').length;
      const vendas    = m.filter(x => x.type === 'venda').length;
      const conv      = contatos > 0 ? Math.round((vendas / contatos) * 100) : 0;

      document.getElementById('r-contatos').textContent  = contatos;
      document.getElementById('r-cotacoes').textContent  = cotacoes;
      document.getElementById('r-vendas').textContent    = vendas;
      document.getElementById('r-conversao').textContent = `${conv}%`;

      renderFunil(contacts || []);
      renderOrigem(contacts || []);
      renderMetricsTable(metrics || []);
    }

    function renderFunil(contacts) {
      const counts = {};
      contacts.forEach(c => { counts[c.funnel_stage] = (counts[c.funnel_stage] || 0) + 1; });
      const total = contacts.length || 1;
      const stages = ['abordagem','sondagem','apresentacao','negociacao','follow_up','vendas_efetivadas','pos_vendas','sem_interesse','reativar'];
      const el = document.getElementById('funil-relatorio');
      if (!contacts.length) { el.innerHTML = '<div class="empty-state"><p>Sem dados ainda</p></div>'; return; }
      el.innerHTML = stages.map(s => {
        const n = counts[s] || 0;
        const pct = Math.round((n / total) * 100);
        return `<div class="funnel-bar-row">
          <span class="funnel-bar-label">${getFunnelLabel(s)}</span>
          <div class="funnel-bar-track"><div class="funnel-bar-fill" style="width:${pct}%"></div></div>
          <span class="funnel-bar-count">${n}</span>
        </div>`;
      }).join('');
    }

    function renderOrigem(contacts) {
      const counts = {};
      contacts.forEach(c => { if (c.source) counts[c.source] = (counts[c.source] || 0) + 1; });
      const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
      const total = contacts.length || 1;
      const el = document.getElementById('origem-relatorio');
      if (!sorted.length) { el.innerHTML = '<div class="empty-state"><p>Sem dados ainda</p></div>'; return; }
      el.innerHTML = sorted.map(([src, n]) => {
        const pct = Math.round((n / total) * 100);
        return `<div class="funnel-bar-row">
          <span class="funnel-bar-label">${getSourceLabel(src)}</span>
          <div class="funnel-bar-track"><div class="funnel-bar-fill" style="width:${pct}%"></div></div>
          <span class="funnel-bar-count">${n}</span>
        </div>`;
      }).join('');
    }

    function renderMetricsTable(metrics) {
      const tbody = document.getElementById('metrics-body');
      if (!metrics.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);">Nenhuma atividade registrada no período</td></tr>';
        return;
      }
      const labels = { contato:'Contato Feito', cotacao:'Cotação Enviada', venda:'Venda Efetivada' };
      const colors = { contato:'badge-info', cotacao:'badge-warning', venda:'badge-success' };
      tbody.innerHTML = metrics.map(m => `
        <tr>
          <td><span class="badge ${colors[m.type]}">${labels[m.type]}</span></td>
          <td>${m.contacts?.name || ''}</td>
          <td>${m.value ? `R$ ${parseFloat(m.value).toFixed(2)}` : ''}</td>
          <td>${formatDate(m.date)}</td>
          <td style="font-size:0.82rem;color:var(--text-muted);">${m.notes || ''}</td>
        </tr>`).join('');
    }

    async function salvarMetrica() {
      const type      = document.getElementById('m-type').value;
      const contactId = document.getElementById('m-contact').value;
      const value     = document.getElementById('m-value').value;
      const date      = document.getElementById('m-date').value;
      const notes     = document.getElementById('m-notes').value.trim();
      if (!contactId) { showToast('Selecione um contato', 'error'); return; }
      const sessionRes = await supabase.auth.getSession();
      const userId = sessionRes?.data?.session?.user?.id || null;
      const { error } = await supabase.from('metrics').insert({
        type,
        contact_id: contactId,
        value: value ? parseFloat(value) : null,
        date: date || todayISO(),
        notes: notes || null,
        created_by: userId,
      });
      if (error) { showToast('Erro ao registrar: ' + error.message, 'error'); return; }
      showToast('Atividade registrada!', 'success');
      closeModal('modal-metrica');
      await loadData();
    }

    document.getElementById('filtro-mes').addEventListener('change', loadData);

    init();
  </script>
</body>
</html>
